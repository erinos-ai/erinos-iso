name: Build ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone erinos-core
        run: |
          git clone --depth 1 https://github.com/erinos-ai/erinos-core.git /tmp/erinos-core

      - name: Prepare profile
        run: |
          mkdir -p airootfs/root/erinos
          rsync -a \
            --exclude='.git' \
            /tmp/erinos-core/ airootfs/root/erinos/

      - name: Stamp version
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ github.ref_name }}" > airootfs/root/erinos/VERSION

      - name: Build ISO in Arch container
        run: |
          docker run --rm --privileged \
            -v "$PWD:/profile:ro" \
            -v "$PWD/out:/out" \
            archlinux:latest \
            bash -c "
              pacman -Syu --noconfirm archiso &&
              mkarchiso -v -w /tmp/archiso-work -o /out /profile &&
              mv /out/erinos-*.iso /out/erinos.iso
            "

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: erinos-${{ github.sha }}
          path: out/erinos.iso
          compression-level: 0

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "${{ github.ref_name }}" \
            out/erinos.iso \
            --title "ErinOS ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
